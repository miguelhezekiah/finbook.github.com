<body>
  <div id="root"></div>

  <!-- Starters -->
  <script type="text/babel" src="src/design-canvas.jsx"></script>
  <script type="text/babel" src="src/browser-window.jsx"></script>
  <script type="text/babel" src="src/tweaks-panel.jsx"></script>

  <!-- App library -->
  <script type="text/babel" src="src/ledger-tokens.jsx"></script>
  <script type="text/babel" src="src/ledger-data.jsx"></script>
  <script type="text/babel" src="src/ledger-ui.jsx"></script>
  <script type="text/babel" src="src/ledger-kpi.jsx"></script>
  <script type="text/babel" src="src/ledger-table.jsx"></script>
  <script type="text/babel" src="src/ledger-screens.jsx"></script>

  <!-- Root app: design canvas with 4 artboards + tweaks panel -->
  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "dark": true,
      "ccyMode": "usd",
      "density": "regular"
    }/*EDITMODE-END*/;

    // Each artboard renders inside a ChromeWindow frame at this size.
    const FRAME_W = 1320;
    const FRAME_H = 880;

    function Artboard({ t, children, url }) {
      // The browser-window starter has a fixed bg:#fff content area — so we
      // wrap the screen in a t.bg-colored fill that fills the chrome's body.
      return (
        <ChromeWindow
          tabs={[{ title: 'Ledger · Streamlit' }]}
          activeIndex={0}
          url={url}
          width={FRAME_W} height={FRAME_H}>
          <div style={{ width: '100%', height: '100%', background: t.bg }}>
            {children}
          </div>
        </ChromeWindow>
      );
    }

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const dark = t.dark;
      const tk = useTokens(dark);

      return (
        <React.Fragment>
          <DesignCanvas>
            <DCSection
              id="finance-ledger"
              title="Finance Ledger · Streamlit"
              subtitle="Hi-fi design pass · dark banking aesthetic · electric-lime accent · multi-currency (IDR/USD)">

              <DCArtboard id="login" label="01 · Login gateway" width={FRAME_W} height={FRAME_H}>
                <Artboard t={tk} url="ledger.streamlit.app / sign-in">
                  <LoginScreen t={tk} dark={dark} />
                </Artboard>
              </DCArtboard>

              <DCArtboard id="empty" label="02 · Empty state (first run)" width={FRAME_W} height={FRAME_H}>
                <Artboard t={tk} url="ledger.streamlit.app / dashboard">
                  <EmptyStateScreen t={tk} dark={dark} />
                </Artboard>
              </DCArtboard>

              <DCArtboard id="dashboard" label="03 · Main dashboard" width={FRAME_W} height={FRAME_H}>
                <Artboard t={tk} url="ledger.streamlit.app / dashboard">
                  <DashboardScreen t={tk} dark={dark} ccyMode={t.ccyMode} density={t.density} />
                </Artboard>
              </DCArtboard>

              <DCArtboard id="add" label="04 · Add transaction" width={FRAME_W} height={FRAME_H}>
                <Artboard t={tk} url="ledger.streamlit.app / dashboard">
                  <AddTransactionScreen t={tk} dark={dark} ccyMode={t.ccyMode} density={t.density} />
                </Artboard>
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel>
            <TweakSection label="Appearance" />
            <TweakToggle label="Dark mode" value={t.dark}
                         onChange={(v) => setTweak('dark', v)} />
            <TweakSection label="KPI currency" />
            <TweakRadio label="Show as" value={t.ccyMode}
                        options={[
                          { value: 'both', label: 'Both' },
                          { value: 'usd',  label: 'USD' },
                          { value: 'idr',  label: 'IDR' },
                        ]}
                        onChange={(v) => setTweak('ccyMode', v)} />
            <TweakSection label="Table" />
            <TweakRadio label="Density" value={t.density}
                        options={[
                          { value: 'compact', label: 'Compact' },
                          { value: 'regular', label: 'Regular' },
                          { value: 'comfy',   label: 'Comfy' },
                        ]}
                        onChange={(v) => setTweak('density', v)} />
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
